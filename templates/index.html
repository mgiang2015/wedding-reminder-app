<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le & Zel 💍</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #faf7f2;
      --warm:    #f0e8db;
      --gold:    #b8976a;
      --gold-lt: #d4b896;
      --ink:     #2c2418;
      --muted:   #8a7a68;
      --success: #4a7c59;
      --error:   #8b3a3a;
      --radius:  2px;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.25rem 4rem;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      padding-top: 1rem;
    }

    .monogram {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 3rem;
      color: var(--gold);
      line-height: 1;
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: var(--gold-lt);
      margin: 1rem auto 0;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border: 1px solid var(--warm);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 3px rgba(44,36,24,0.04);
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--ink);
      margin-bottom: 1rem;
    }

    /* ── upload area ── */
    .upload-area {
      border: 1.5px dashed var(--gold-lt);
      border-radius: var(--radius);
      padding: 1.25rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .upload-area:hover  { border-color: var(--gold); background: var(--cream); }
    .upload-area.loaded { border-color: var(--success); border-style: solid; background: #f2f8f4; }
    .upload-area input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-icon  { font-size: 1.5rem; margin-bottom: 0.3rem; }
    .upload-label { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .upload-label.loaded { color: var(--success); }

    /* ── guest badge ── */
    #guest-badge {
      display: none;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.85rem;
      padding: 0.35rem 0.75rem;
      background: var(--warm);
      border: 1px solid var(--gold-lt);
      border-radius: 20px;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      cursor: pointer;
      width: fit-content;
    }
    #guest-badge.visible { display: inline-flex; }
    #guest-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

    /* ── action buttons ── */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    button {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 0.5rem;
      border-radius: var(--radius);
      border: 1px solid var(--gold-lt);
      background: white;
      color: var(--ink);
      cursor: pointer;
      transition: all 0.15s ease;
      line-height: 1.3;
    }
    button:hover  { background: var(--warm); border-color: var(--gold); }
    button:active { transform: scale(0.97); }
    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    /* ── locked state overlay ── */
    .actions-wrap { position: relative; }
    #locked-notice {
      position: absolute; inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(250,247,242,0.75);
      border-radius: var(--radius);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      pointer-events: none;
      backdrop-filter: blur(1px);
    }
    #locked-notice.hidden { display: none; }

    /* ── log panel ── */
    #log-wrap { width: 100%; max-width: 420px; display: none; }
    #log-wrap.visible { display: block; }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    #log {
      background: var(--ink);
      color: #e8dfc8;
      font-size: 0.72rem;
      font-family: 'Courier New', monospace;
      line-height: 1.6;
      padding: 1.25rem;
      border-radius: var(--radius);
      max-height: 340px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .log-success { color: #7ec99a; }
    .log-error   { color: #e08080; }
    .log-muted   { color: #7a6e5e; }
    .log-gold    { color: #d4b896; }

    .spinner {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid var(--gold-lt);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .summary {
      margin-top: 0.75rem;
      padding: 0.6rem 1rem;
      border-radius: var(--radius);
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-align: center;
    }
    .summary.ok  { background: #eaf3ec; color: var(--success); border: 1px solid #c3ddc9; }
    .summary.err { background: #f3eaea; color: var(--error);   border: 1px solid #ddc3c3; }
  </style>
</head>
<body>

  <header>
    <div class="monogram">L &amp; Z</div>
    <div class="subtitle">Wedding WhatsApp Sender</div>
    <div class="divider"></div>
  </header>

  <!-- Upload -->
  <div class="card">
    <div class="card-title">📋 Guest List</div>
    <div class="upload-area" id="upload-area">
      <input type="file" accept=".csv" id="csv-input" onchange="handleUpload(this)" />
      <div class="upload-icon">📂</div>
      <div class="upload-label" id="upload-label">Tap to upload guests.csv</div>
    </div>
    <div id="guest-badge" onclick="previewGuests()">
      <span class="dot"></span>
      <span id="guest-count"></span>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions-wrap">
    <div class="card">
      <div class="card-title">🕊 Reminders</div>
      <div class="btn-grid action-btns">
        <button onclick="send('reminder_2_week')">2 Weeks Before</button>
        <button onclick="send('reminder_1_week')">1 Week Before</button>
        <button onclick="send('reminder_1_day')">1 Day Before</button>
        <button onclick="send('reminder_0_day')">Day Of</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📲 Check-in & Follow-up</div>
      <div class="btn-grid action-btns">
        <button onclick="send('qr_media')">Send QR Code</button>
        <button onclick="send('after')">After Wedding</button>
      </div>
    </div>

    <div id="locked-notice">⬆ Upload guest list first</div>
  </div>

  <!-- Log -->
  <div id="log-wrap">
    <p class="section-label">Execution log</p>
    <div id="log"></div>
    <div id="summary"></div>
  </div>

  <script>
    const LABELS = {
      reminder_2_week : "2-Week Reminder",
      reminder_1_week : "1-Week Reminder",
      reminder_1_day  : "1-Day Reminder",
      reminder_0_day  : "Day-Of Reminder",
      qr_media        : "Check-in QR Code",
      after           : "After-Wedding Message",
    };

    let guestsLoaded = false;

    // ── CSV upload ────────────────────────────────────────────────────────────
    async function handleUpload(input) {
      const file = input.files[0];
      if (!file) return;

      const label = document.getElementById("upload-label");
      const area  = document.getElementById("upload-area");
      label.textContent = "Uploading…";

      const fd = new FormData();
      fd.append("file", file);

      try {
        const res  = await fetch("/upload", { method: "POST", body: fd });
        const data = await res.json();

        if (data.error) {
          label.textContent = `Error: ${data.error}`;
          return;
        }

        // Update UI
        area.classList.add("loaded");
        label.classList.add("loaded");
        label.textContent = `✓ ${file.name}`;

        const badge = document.getElementById("guest-badge");
        document.getElementById("guest-count").textContent =
          `${data.with_phone} guests loaded — tap to preview`;
        badge.classList.add("visible");

        // Unlock action buttons
        document.getElementById("locked-notice").classList.add("hidden");
        guestsLoaded = true;

      } catch (e) {
        label.textContent = `Upload failed: ${e.message}`;
      }
    }

    // ── guest preview ─────────────────────────────────────────────────────────
    async function previewGuests() {
      const wrap = document.getElementById("log-wrap");
      const log  = document.getElementById("log");
      wrap.classList.add("visible");
      document.getElementById("summary").innerHTML = "";
      log.innerHTML = `<span class="log-muted">Loading preview…</span>`;

      try {
        const res  = await fetch("/upload", { method: "GET" });
        // We'll just re-use the in-memory state via a dedicated endpoint
      } catch {}

      // Re-read from the last upload response stored in memory
      log.innerHTML = `<span class="log-muted">Preview not available — re-upload CSV to refresh.</span>`;
      wrap.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    // ── send ──────────────────────────────────────────────────────────────────
    async function send(action) {
      if (!guestsLoaded) return;

      const label = LABELS[action];
      if (!confirm(`Send "${label}" to all guests?`)) return;

      const wrap    = document.getElementById("log-wrap");
      const log     = document.getElementById("log");
      const summary = document.getElementById("summary");
      const buttons = document.querySelectorAll("button");

      wrap.classList.add("visible");
      log.innerHTML     = `<span class="spinner"></span><span class="log-gold">Sending ${label}…</span>\n`;
      summary.innerHTML = "";
      buttons.forEach(b => b.disabled = true);
      wrap.scrollIntoView({ behavior: "smooth", block: "start" });

      try {
        const res  = await fetch(`/send/${action}`, { method: "POST" });
        const data = await res.json();

        if (data.error) {
          log.innerHTML += `\n<span class="log-error">Error: ${data.error}</span>`;
          summary.innerHTML = `<div class="summary err">❌ ${data.error}</div>`;
          return;
        }

        let out = `<span class="log-gold">Action  : ${label}\nTotal   : ${data.total}\nSent    : ${data.successful.length}\nFailed  : ${data.failed.length}\n</span>\n`;

        if (data.successful.length) {
          out += `<span class="log-success">── Successful ──────────────────\n</span>`;
          data.successful.forEach(s => {
            out += `<span class="log-success">✓</span> ${s.name.padEnd(28)} ${s.phone}\n  <span class="log-muted">SID: ${s.sid}  [${s.status}]</span>\n`;
          });
        }

        if (data.failed.length) {
          out += `\n<span class="log-error">── Failed (${data.failed.length}) ─────────────────\n</span>`;
          out += `<span class="log-muted">${"ID".padEnd(8)}${"Name".padEnd(28)}${"Phone".padEnd(16)}Error\n</span>`;
          data.failed.forEach(f => {
            out += `<span class="log-error">✗</span> ${f.guest_id.padEnd(8)}${f.name.padEnd(28)}${f.phone.padEnd(16)}\n  <span class="log-muted">↳ ${f.error}</span>\n`;
          });
        }

        log.innerHTML = out;
        const allOk = data.failed.length === 0;
        summary.innerHTML = allOk
          ? `<div class="summary ok">✅ All ${data.successful.length} messages sent successfully</div>`
          : `<div class="summary err">⚠️ ${data.successful.length} sent, ${data.failed.length} failed</div>`;

      } catch (e) {
        log.innerHTML += `\n<span class="log-error">Network error: ${e.message}</span>`;
        summary.innerHTML = `<div class="summary err">❌ Network error</div>`;
      } finally {
        buttons.forEach(b => b.disabled = false);
      }
    }
  </script>
</body>
</html>
